<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Students List – Smart Location Based Attendance System." />
  <title>Students List – SmartAttend</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">

  <!-- Toast container -->
  <div class="toast-container-custom" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <div class="admin-layout">

    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation">
      <a class="sidebar-brand" href="admin-dashboard.html" aria-label="SmartAttend Admin home">
        <i class="bi bi-geo-alt-fill"></i>
        SmartAttend
      </a>

      <div class="sidebar-label">Main Menu</div>
      <ul class="sidebar-nav">
        <li>
          <a href="admin-dashboard.html">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li>
          <a href="manage-classes.html">
            <i class="bi bi-journal-bookmark"></i> Classes
          </a>
        </li>
        <li>
          <a href="students-list.html" class="active" aria-current="page">
            <i class="bi bi-people"></i> Students
          </a>
        </li>
        <li>
          <a href="attendance-report.html">
            <i class="bi bi-clipboard-data"></i> Attendance Report
          </a>
        </li>
      </ul>

      <div class="sidebar-logout">
        <button id="logoutBtn" class="btn-outline-custom w-100 justify-content-center"
                style="font-size:.88rem; padding:.6rem 1rem;" aria-label="Logout">
          <i class="bi bi-box-arrow-left me-1"></i> Logout
        </button>
      </div>
    </aside>

    <!-- ── Main Content ──────────────────────────────────────────── -->
    <div class="admin-main">

      <!-- Topbar -->
      <header class="admin-topbar">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="bi bi-list"></i>
        </button>
        <div class="page-title">
          <i class="bi bi-people me-2" style="color:var(--primary);" aria-hidden="true"></i>
          Students
        </div>
        <span id="studentCount" style="font-size:.82rem; color:var(--text-muted-light);"></span>
      </header>

      <!-- Content -->
      <div class="admin-content">

        <!-- Loading state -->
        <div id="loadingState" class="page-loading" aria-live="polite" aria-label="Loading students">
          <div class="spinner-custom" style="width:40px; height:40px; border-width:4px;" aria-hidden="true"></div>
          <p class="text-muted-light">Loading students…</p>
        </div>

        <!-- Error state -->
        <div id="errorState" style="display:none;" class="page-loading" aria-live="polite">
          <div class="glass-card p-4 text-center" style="max-width:400px;">
            <i class="bi bi-exclamation-triangle-fill"
               style="font-size:2.5rem; color:var(--danger); display:block; margin-bottom:1rem;"
               aria-hidden="true"></i>
            <p id="errorMsg" class="text-muted-light mb-3">Failed to load students.</p>
            <button class="btn-primary-custom" onclick="loadStudents()">
              <i class="bi bi-arrow-clockwise me-1"></i> Retry
            </button>
          </div>
        </div>

        <!-- Students content -->
        <div id="studentsContent" style="display:none;">

          <!-- Search bar -->
          <div class="glass-card p-3 mb-3 animate-fade-down">
            <div class="admin-search-wrap">
              <div class="search-icon-wrap">
                <i class="bi bi-search" aria-hidden="true"></i>
                <input
                  type="search"
                  id="searchInput"
                  class="admin-search-input"
                  placeholder="Search by name, email, or roll number…"
                  aria-label="Search students"
                />
              </div>
            </div>
            <p id="filterInfo" class="text-muted-light mb-0" style="font-size:.82rem;"></p>
          </div>

          <!-- Table card -->
          <div class="glass-card animate-fade-up" style="animation-delay:.1s;">
            <div class="table-responsive-custom">
              <table class="table-custom" aria-label="Students list">
                <thead>
                  <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Roll Number</th>
                    <th scope="col">Branch</th>
                  </tr>
                </thead>
                <tbody id="studentsTableBody"></tbody>
              </table>

              <!-- Empty state -->
              <div id="noRecords" class="no-records" style="display:none;" aria-live="polite">
                <i class="bi bi-person-x" aria-hidden="true"></i>
                No students found matching your search.
              </div>
            </div>
          </div>

        </div><!-- /#studentsContent -->

      </div><!-- /.admin-content -->

      <!-- Footer -->
      <footer class="footer-custom" role="contentinfo" style="margin-top:0;">
        <div class="container-fluid px-4">
          <p>&copy; <span id="footerYear"></span> <span class="text-gradient fw-600">SmartAttend</span></p>
        </div>
      </footer>

    </div><!-- /.admin-main -->
  </div><!-- /.admin-layout -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Shared config (API_BASE) -->
  <script src="config.js"></script>
  <!-- API -->
  <script src="js/api.js"></script>

  <script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();

    /* ── Auth guard ── */
    if (!localStorage.getItem('admin_token') || localStorage.getItem('role') !== 'admin') {
      window.location.href = 'admin-login.html';
    }

    /* ── Sidebar toggle ── */
    const sidebar   = document.getElementById('adminSidebar');
    const overlay   = document.getElementById('sidebarOverlay');
    const toggleBtn = document.getElementById('sidebarToggle');

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
    }

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);

    /* ── Toast helper ── */
    function showToast(msg, type = 'info') {
      const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', info: 'bi-info-circle-fill' };
      const container = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = `toast-custom ${type}`;
      el.setAttribute('role', type === 'error' ? 'alert' : 'status');
      el.innerHTML = `
        <i class="bi ${icons[type] || icons.info} toast-icon" aria-hidden="true"></i>
        <span class="toast-msg">${msg}</span>
        <button class="toast-close" aria-label="Close notification">&times;</button>
      `;
      el.querySelector('.toast-close').addEventListener('click', () => el.remove());
      container.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }

    /* ── All students (raw data) ── */
    let allStudents = [];

    /* ── Render table rows ── */
    function renderTable(students) {
      const tbody   = document.getElementById('studentsTableBody');
      const noRec   = document.getElementById('noRecords');
      const info    = document.getElementById('filterInfo');
      tbody.innerHTML = '';

      const total = allStudents.length;
      info.textContent = students.length === total
        ? `${total} student${total !== 1 ? 's' : ''} total`
        : `Showing ${students.length} of ${total} students`;

      if (students.length === 0) {
        noRec.style.display = 'block';
        return;
      }
      noRec.style.display = 'none';

      students.forEach((s, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>
            <div class="student-name-cell">
              <div class="student-avatar">${(s.name || 'S').charAt(0).toUpperCase()}</div>
              <span>${s.name || '—'}</span>
            </div>
          </td>
          <td style="color:var(--text-muted-light); font-size:.85rem;">${s.email || '—'}</td>
          <td>${s.roll_number ?? s.rollNumber ?? '—'}</td>
          <td>
            <span class="branch-badge">${s.branch || '—'}</span>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    /* ── Filter students ── */
    function applyFilters() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();

      const filtered = allStudents.filter((s) => {
        return !query ||
          (s.name        || '').toLowerCase().includes(query) ||
          (s.email       || '').toLowerCase().includes(query) ||
          String(s.roll_number ?? s.rollNumber ?? '').toLowerCase().includes(query);
      });

      renderTable(filtered);
    }

    /* ── Load students ── */
    async function loadStudents() {
      document.getElementById('loadingState').style.display    = 'flex';
      document.getElementById('errorState').style.display      = 'none';
      document.getElementById('studentsContent').style.display = 'none';

      const result = await getAdminStudents();

      document.getElementById('loadingState').style.display = 'none';

      if (!result.ok) {
        document.getElementById('errorMsg').textContent = result.message || 'Failed to load students.';
        document.getElementById('errorState').style.display = 'flex';
        showToast(result.message || 'Failed to load students', 'error');
        return;
      }

      const data = result.data;
      allStudents = Array.isArray(data)
        ? data
        : (data.students ?? data.data ?? []);

      document.getElementById('studentsContent').style.display = 'block';
      document.getElementById('studentCount').textContent =
        `${allStudents.length} student${allStudents.length !== 1 ? 's' : ''}`;

      renderTable(allStudents);
    }

    /* ── Search listener ── */
    document.getElementById('searchInput').addEventListener('input', applyFilters);

    /* ── Logout ── */
    document.getElementById('logoutBtn').addEventListener('click', () => {
      clearAdminSession();
      showToast('Logged out successfully', 'info');
      setTimeout(() => { window.location.href = 'admin-login.html'; }, 800);
    });

    /* ── Init ── */
    loadStudents();
  </script>

</body>
</html>
